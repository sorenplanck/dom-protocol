name: Backup Sync

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror para dom-wallet
        run: |
          git remote add backup https://x-access-token:${{ secrets.BACKUP_TOKEN }}@github.com/sorenplanck/dom-wallet.git
          git push backup --mirror
