name: Build DOM Wallet

on:
  push:
    tags:
      - "wallet-v*"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dom-wallet-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            args: ""
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        if: matrix.platform != 'macos-latest'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust macOS universal
        if: matrix.platform == 'macos-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: wallet-desktop/src-tauri -> target

      - name: Linux deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential \
            clang \
            cmake \
            pkg-config

      - name: macOS deps
        if: matrix.platform == 'macos-latest'
        run: brew install cmake

      - name: Windows deps
        if: matrix.platform == 'windows-latest'
        run: |
          choco install -y llvm cmake --no-progress
        shell: bash

      - name: Build DOM Wallet
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBCLANG_PATH: ${{ matrix.platform == 'windows-latest' && 'C:\Program Files\LLVM\bin' || '' }}
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.platform == 'macos-latest' && '11.0' || '' }}
          RUSTFLAGS: ${{ matrix.platform == 'macos-latest' && '-C link-arg=-Wl,-undefined,dynamic_lookup' || '' }}
        with:
          projectPath: wallet-desktop
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('wallet-v0.0.0-dev-{0}', github.run_number) }}
          releaseName: "DOM Wallet ${{ github.ref_type == 'tag' && github.ref_name || 'dev build' }}"
          releaseBody: "Official DOM Wallet desktop build with integrated node. Not a store of value. A means of exchange."
          releaseDraft: true
          prerelease: ${{ github.ref_type != 'tag' }}
          args: ${{ matrix.args }}
