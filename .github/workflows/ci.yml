name: CI

# Phase 1.4 — cross-platform equivalence CI. Builds, clippies, and
# tests the workspace on the four host matrices the protocol must
# remain deterministic across. The Windows leg is intentionally
# marked `continue-on-error: true` until the secp256k1-zkp / randomx-rs
# C builds are pinned to an MSVC toolchain proven to reproduce the
# RFC-0004 PMMR roots — see docs/RELEASE_BLOCKERS.md (RB-PMMR-001).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # randomx-rs requires the C library to build; integration tests are
  # excluded across the matrix because the FULL_MEM dataset (~2 GB) is
  # far above GitHub-hosted runner budgets. Single-host validation of
  # the heavy integration suite is tracked separately.

jobs:
  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  build-test:
    name: build + clippy + test (${{ matrix.host }})
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: linux-x86_64
            runner: ubuntu-latest
            experimental: false
          - host: linux-arm64
            runner: ubuntu-22.04-arm
            experimental: false
          - host: macos-arm64
            runner: macos-latest
            experimental: false
          - host: macos-x86_64
            runner: macos-13
            experimental: false
          - host: windows-x86_64
            runner: windows-latest
            experimental: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ matrix.host }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.host }}-

      # secp256k1-zkp and randomx-rs link against C — make sure
      # build-essential / Xcode CLT / MSVC are present. On Linux runners
      # these are preinstalled; macOS ships clang; Windows needs Visual
      # C++ Build Tools which `windows-latest` provides by default.
      - name: Install Linux build tooling
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config

      - name: cargo build --workspace
        run: cargo build --workspace --all-targets

      - name: cargo clippy --workspace -- -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test --workspace (excluding integration)
        run: cargo test --workspace --exclude dom-integration-tests --all-targets

  cargo-tests-by-crate:
    name: cargo tests by crate (linux)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-linux-crate-tests-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-linux-crate-tests-

      - name: Install Linux build tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config

      - name: cargo check --workspace
        run: cargo check --workspace

      - name: cargo test -p dom-consensus
        run: cargo test -p dom-consensus

      - name: cargo test -p dom-chain
        run: cargo test -p dom-chain

      - name: cargo test -p dom-store
        run: cargo test -p dom-store

      - name: cargo test -p dom-node
        run: cargo test -p dom-node

      - name: cargo test -p dom-mempool
        run: cargo test -p dom-mempool

  integration-tests:
    name: dom-integration-tests (linux fast mining)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DOM_NETWORK: regtest
      DOM_REGTEST_FAST_MINING: "1"
      RUST_BACKTRACE: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-linux-integration-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-linux-integration-

      - name: Install Linux build tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config

      - name: cargo test -p dom-integration-tests
        run: cargo test -p dom-integration-tests -- --test-threads=1

      - name: cargo test -p dom-integration-tests --ignored
        run: cargo test -p dom-integration-tests -- --ignored --test-threads=1

  pmmr-vectors-cross-platform:
    name: pinned PMMR vectors must reproduce on ${{ matrix.host }}
    runs-on: ${{ matrix.runner }}
    needs: build-test
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: linux-x86_64
            runner: ubuntu-latest
            experimental: false
          - host: linux-arm64
            runner: ubuntu-22.04-arm
            experimental: false
          - host: macos-arm64
            runner: macos-latest
            experimental: false
          - host: macos-x86_64
            runner: macos-13
            experimental: false
          - host: windows-x86_64
            runner: windows-latest
            experimental: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build tooling
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config

      # The pinned RFC-0004 hex vectors are the cross-platform contract
      # for the PMMR layout. If this leg fails on a runner where
      # build-test passed, the protocol has lost cross-platform
      # determinism on that platform.
      - name: Run pinned PMMR vector tests
        run: |
          cargo test -p dom-test-vectors --lib pmmr_vectors

      - name: Run hash + serialization vector tests
        run: |
          cargo test -p dom-test-vectors --lib hash_vectors
          cargo test -p dom-test-vectors --lib serialization_vectors

      - name: Run PMMR adversarial + reproducer suite
        run: |
          cargo test -p dom-pmmr --tests

      - name: Print pinned PMMR vectors (cross-platform audit log)
        run: |
          cargo test -p dom-test-vectors --lib pmmr_vectors::tests::print_pmmr_vectors -- --nocapture

      # Phase 1.4 deterministic snapshot manifest — every host
      # produces the SAME byte sequence. The compare-snapshots job
      # (below) downloads every host's artifact and asserts they
      # are byte-identical. Any divergence is a consensus-class
      # cross-platform regression.
      - name: Generate deterministic snapshot manifest
        shell: bash
        run: |
          cargo run -p dom-test-vectors --bin cross_platform_snapshot --quiet \
            > snapshot.${{ matrix.host }}.txt
          wc -c snapshot.${{ matrix.host }}.txt
          head -5 snapshot.${{ matrix.host }}.txt

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-${{ matrix.host }}
          path: snapshot.${{ matrix.host }}.txt
          if-no-files-found: error

  compare-snapshots:
    name: cross-platform snapshot byte-equivalence
    runs-on: ubuntu-latest
    needs: pmmr-vectors-cross-platform
    steps:
      - uses: actions/checkout@v4

      - name: Download every host's snapshot
        uses: actions/download-artifact@v4
        with:
          pattern: snapshot-*
          path: snapshots
          merge-multiple: true

      # The non-experimental matrix legs (linux-x86_64, linux-arm64,
      # macos-arm64, macos-x86_64) MUST produce a byte-identical
      # manifest. Windows is `continue-on-error: true` in the
      # matrix above and is therefore tolerated here too — its
      # divergence does NOT fail the gate until the MSVC build
      # path is green (RB-PMMR-001 deferred-validation list).
      - name: Diff snapshots across non-experimental hosts
        run: |
          set -euo pipefail
          ls -la snapshots/
          REFERENCE=snapshots/snapshot.linux-x86_64.txt
          if [ ! -f "$REFERENCE" ]; then
            echo "FATAL: reference snapshot ${REFERENCE} missing — linux-x86_64 leg did not upload"
            exit 1
          fi
          REQUIRED_HOSTS="linux-arm64 macos-arm64 macos-x86_64"
          for host in $REQUIRED_HOSTS; do
            CANDIDATE="snapshots/snapshot.${host}.txt"
            if [ ! -f "$CANDIDATE" ]; then
              echo "FATAL: missing snapshot for required host ${host}"
              exit 1
            fi
            if ! diff -u "$REFERENCE" "$CANDIDATE"; then
              echo "DIVERGENCE: ${host} differs from linux-x86_64 reference"
              exit 1
            fi
            echo "OK: ${host} byte-identical to linux-x86_64"
          done
          # Advisory diff against Windows (continue-on-error).
          if [ -f snapshots/snapshot.windows-x86_64.txt ]; then
            if diff -u "$REFERENCE" snapshots/snapshot.windows-x86_64.txt > /dev/null; then
              echo "BONUS: windows-x86_64 ALSO byte-identical"
            else
              echo "ADVISORY: windows-x86_64 diverges (expected until RB-PMMR-001 MSVC pinning):"
              diff -u "$REFERENCE" snapshots/snapshot.windows-x86_64.txt || true
            fi
          fi
