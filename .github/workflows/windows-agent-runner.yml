name: Windows Agent Runner

on:
  workflow_dispatch:
  push:
    paths:
      - 'crates/dom-agent-runner/**'
      - '.github/workflows/windows-agent-runner.yml'

# IMPORTANT: this workflow never invokes a real Codex run inside CI.
# It only builds the binary and runs doctor as far as possible without
# requiring secrets. Real Codex usage stays on the user's Windows machine.

jobs:
  build:
    name: build dom-agent-runner.exe
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-agent-runner

      - name: cargo check
        run: cargo check -p dom-agent-runner

      - name: cargo test
        run: cargo test -p dom-agent-runner

      - name: cargo clippy
        run: cargo clippy -p dom-agent-runner --all-targets -- -D warnings

      - name: cargo build --release
        run: cargo build -p dom-agent-runner --release

      - name: Doctor (best-effort; expects codex to be missing in CI)
        shell: pwsh
        # The agent runner reports codex absence with a helpful message
        # but still exits 0 from doctor — that's the intended behavior.
        run: |
          .\target\release\dom-agent-runner.exe doctor

      - name: Stage artifact contents
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact | Out-Null
          Copy-Item target/release/dom-agent-runner.exe artifact/
          if (Test-Path docs/testing/WINDOWS_AGENT_WORKFLOW.md) {
            Copy-Item docs/testing/WINDOWS_AGENT_WORKFLOW.md artifact/
          }

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: DOM-Agent-Runner-Windows-Portable
          path: artifact/
          if-no-files-found: error
