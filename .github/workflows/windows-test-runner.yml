name: Windows Test Runner

on:
  workflow_dispatch:
  push:
    paths:
      - 'crates/dom-test-runner/**'
      - '.github/workflows/windows-test-runner.yml'

jobs:
  build:
    name: build dom-test-runner.exe
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-test-runner

      - name: cargo check
        run: cargo check -p dom-test-runner

      - name: cargo test
        run: cargo test -p dom-test-runner

      - name: cargo clippy
        run: cargo clippy -p dom-test-runner --all-targets -- -D warnings

      - name: cargo build --release
        run: cargo build -p dom-test-runner --release

      - name: Run doctor (sanity check inside CI repo)
        shell: pwsh
        run: |
          .\target\release\dom-test-runner.exe doctor

      - name: Stage artifact contents
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact | Out-Null
          Copy-Item target/release/dom-test-runner.exe artifact/
          if (Test-Path docs/testing/WINDOWS_TEST_RUNNER.md) {
            Copy-Item docs/testing/WINDOWS_TEST_RUNNER.md artifact/
          }

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: DOM-Test-Runner-Windows-Portable
          path: artifact/
          if-no-files-found: error
