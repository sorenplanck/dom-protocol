[package]
name = "dom-pmmr-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
arbitrary = { version = "1", features = ["derive"] }

[dependencies.dom-pmmr]
path = ".."

[[bin]]
name = "fuzz_pmmr_push"
path = "fuzz_targets/fuzz_pmmr_push.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_pmmr_many_push"
path = "fuzz_targets/fuzz_pmmr_many_push.rs"
test = false
doc = false
bench = false

[workspace]
