edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"

[dependencies.dom-slate]
path = ".."

[dependencies.dom-tx]
path = "../../dom-tx"

[dependencies.dom-serialization]
path = "../../dom-serialization"

[[bin]]
name = "fuzz_respond_receive"
