[package]
name = "dom-wallet-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
tempfile = "3.10"
serde_json = "1"

[dependencies.dom-wallet]
path = ".."

# Prevent this from being picked up by the workspace build.
[workspace]

[profile.release]
debug = 1

[[bin]]
name = "fuzz_journal_replay"
path = "fuzz_targets/fuzz_journal_replay.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_journal_entry_decode"
path = "fuzz_targets/fuzz_journal_entry_decode.rs"
test = false
doc = false
bench = false
