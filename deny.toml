# dom-shield F1 — supply-chain detector for the DOM workspace.
#
# DETECTOR ONLY. This file is the policy that flags supply-chain risks; it does
# NOT fix anything. Fixing what it reports (e.g. pinning a floating git dep) is a
# separate, human decision. Covers the 3 F1 vectors:
#   (1) [advisories] RUSTSEC vulnerabilities + yanked crates -> deny
#   (2) [sources]    git dependency must be pinned by rev (catches the
#                    secp256k1-zkp branch="master" in crates/dom-crypto/Cargo.toml)
#   (3) [licenses]   allow-list frozen to the licenses currently present in the
#                    tree (any NEW license type is then flagged on introduction)

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
confidence-threshold = 0.8
# Allow-list = exactly the SPDX licenses present in the workspace today
# (discovered via `cargo deny list`). NOT an invented set: a freeze, so any
# newly-introduced license type trips the detector for review.
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-1-Clause",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "LGPL-2.1-or-later",
    "LicenseRef-UFL-1.0",
    "MIT",
    "MPL-2.0",
    "OFL-1.1",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

[bans]
# F1 targets git-source hygiene + advisories + licenses, not version dedup.
# Keep version/wildcard hygiene non-failing so the supply-chain signal stays clean.
multiple-versions = "allow"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
# Every git dependency MUST be pinned by an exact commit rev (no branch/tag).
# This is the rule that fires on secp256k1-zkp { branch = "master" }.
required-git-spec = "rev"
# The upstream Blockstream repo is a legitimate source — but only when pinned by
# rev (enforced by required-git-spec above). Listing it here does NOT exempt the
# rev requirement.
allow-git = [
    "https://github.com/BlockstreamResearch/rust-secp256k1-zkp",
]
