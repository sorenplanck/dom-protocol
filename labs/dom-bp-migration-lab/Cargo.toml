[workspace]
members = ["."]
resolver = "2"

[package]
name = "dom-bp-migration-lab"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
dom-crypto = { path = "../../crates/dom-crypto" }
grin_secp256k1zkp = "=0.7.15"
hex = "0.4"
k256 = "=0.13.4"
rand = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
thiserror = "1"
zeroize = "1"
