[package]
name = "dom-wallet"
version = "0.1.0"
description = "DOM Wallet — official desktop wallet with an embedded DOM node (V1: mining + coinbase)"
authors = ["DOM Protocol"]
license = "MIT"
edition = "2021"
rust-version = "1.75"

# The Tauri desktop binary. `lib` is used by tests / mobile tooling; the desktop
# app is produced from `main.rs` (which just calls `dom_wallet_lib::run()`).
[lib]
name = "dom_wallet_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
tauri-plugin-clipboard-manager = "2"

serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
anyhow = "1"
hex = "0.4"
url = "2.5"
zeroize = { version = "1.7", features = ["derive"] }
rand = "0.8"

# Async runtime + tracing capture for the embedded node.
tokio = { version = "1.35", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "registry"] }

# Update check + Prometheus /metrics scrape (blocking, run via spawn_blocking).
reqwest = { version = "0.12", features = ["blocking", "json"] }

# ── DOM Protocol crates ───────────────────────────────────────────────────────
# Consumed by GIT so that tag-triggered GitHub Actions builds are reproducible
# and do NOT depend on a sibling checkout. Pin `rev` for release builds; `branch`
# is convenient for development. We REUSE these crates: no crypto, consensus,
# P2P, or wallet logic is reimplemented here — the backend only orchestrates them.
#
# NOTE: pin a concrete `rev = "<commit-sha>"` before tagging a release so the
# wallet and the protocol it embeds are locked together (critical for hard-fork
# coordination, see Principle 5).
dom-core      = { git = "https://github.com/sorenplanck/dom-protocol", branch = "main" }
dom-consensus = { git = "https://github.com/sorenplanck/dom-protocol", branch = "main" }
dom-crypto    = { git = "https://github.com/sorenplanck/dom-protocol", branch = "main" }
dom-config    = { git = "https://github.com/sorenplanck/dom-protocol", branch = "main" }
dom-wallet    = { git = "https://github.com/sorenplanck/dom-protocol", branch = "main" }
dom-node      = { git = "https://github.com/sorenplanck/dom-protocol", branch = "main" }
dom-rpc       = { git = "https://github.com/sorenplanck/dom-protocol", branch = "main" }
# V2: the Slate type + its (de)serialization traits, for Slatepack transport.
dom-tx            = { git = "https://github.com/sorenplanck/dom-protocol", branch = "main" }
dom-serialization = { git = "https://github.com/sorenplanck/dom-protocol", branch = "main" }

# ── V2 transaction-transport crypto/encoding ──────────────────────────────────
# Slatepack (Mode A): age-style x25519 + ChaCha20Poly1305 over the serialized
# slate, bech32m address reuse from dom-core, base58 grouping for the envelope.
# Descriptor (Mode B): bs58 + ChaCha20Poly1305 for the encrypted blinding factor.
bech32 = "0.11"
bs58 = "0.5"
x25519-dalek = { version = "2", features = ["static_secrets"] }
ed25519-dalek = "2"
chacha20poly1305 = "0.10"
hkdf = "0.12"
argon2 = "0.5"
sha2 = "0.10"
uuid = { version = "1", features = ["v4", "serde"] }

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
overflow-checks = true
