<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DOM Wallet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Spectral:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ── Onboarding / unlock (no sidebar) ──────────────────────────────── -->
  <div id="gate" class="center-screen">
    <img class="coin-hero" src="assets/dom-coin.png" alt="DOM" />
    <div id="gate-body" style="width: 520px; max-width: 90vw;"></div>
  </div>

  <!-- ── Main app (hidden until wallet open + unlocked) ────────────────── -->
  <div id="app" class="hidden">
    <aside class="sidebar">
      <div class="brand">
        <img src="assets/dom-coin.png" alt="DOM" />
        <div>
          <div class="name">DOM</div>
          <div class="tick">WALLET · DOM</div>
        </div>
      </div>
      <nav class="nav" id="nav">
        <button data-screen="dashboard" class="active">Dashboard</button>
        <button data-screen="pay">Pagar</button>
        <button data-screen="receive">Receber</button>
        <button data-screen="history">Histórico</button>
        <button data-screen="node">Nó / Logs</button>
        <button data-screen="settings">Configurações</button>
      </nav>
      <div class="foot">
        <div class="motto">"Not a store of value.<br/>A means of exchange."</div>
        <button class="theme-toggle" id="themeToggle">Toggle theme</button>
        <button class="theme-toggle" id="lockBtn" style="margin-top:6px;">Lock wallet</button>
      </div>
    </aside>
    <main class="main"><div id="screen"></div></main>
  </div>

  <div id="toast"></div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
